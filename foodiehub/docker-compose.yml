version: '3.9'
services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - '5000:5000'
    depends_on:
      - mongo
      - redis

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  mongo_data:
